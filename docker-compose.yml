version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: xeno-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xenocrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xenocrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xeno-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  stub_channel:
    build:
      context: ./stub_channel_service
      dockerfile: Dockerfile
    container_name: xeno-stub-channel
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - CRM_CALLBACK_URL=http://backend:8000/api/v1/webhooks/channel-receipt
    depends_on:
      - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xeno-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/xenocrm
      - REDIS_URL=redis://redis:6379/0
      - STUB_CHANNEL_URL=http://stub_channel:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-mock-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-mock-key}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xeno-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
